name: Update Active TFR KML

on:
  schedule:
    # Runs once every hour. GitHub Actions schedules use UTC.
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: active-tfr-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build TFR site
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify converter exists
        shell: bash
        run: |
          set -euo pipefail
          echo "Repository root:"
          pwd
          echo
          echo "Top-level files:"
          ls -la
          echo
          echo "Converter file:"
          ls -la "tfr_kml_converter.py"
          test -f "tfr_kml_converter.py"
          echo "Found tfr_kml_converter.py"

      - name: Generate KML and KMZ
        shell: bash
        env:
          SOURCE_URL: https://tfr.faa.gov/tfr3/export/json
          OUTPUT_KML: ${{ github.workspace }}/site/active_tfrs.kml
          OUTPUT_KMZ: ${{ github.workspace }}/site/active_tfrs.kmz
          CREATE_KMZ: "1"
        run: |
          set -euo pipefail
          mkdir -p site
          python "tfr_kml_converter.py"
          test -s site/active_tfrs.kml
          test -s site/active_tfrs.kmz
          echo "Generated KML and KMZ successfully"

      - name: Build Pages site
        shell: bash
        run: |
          set -euo pipefail
          UPDATED_AT="$(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          PAGES_BASE_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${REPO_NAME}"

          cat > site/Active_TFRs_Network_Link.kml <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <kml xmlns="http://www.opengis.net/kml/2.2">
            <Document>
              <name>Active TFRs</name>
              <description>Hosted FAA Temporary Flight Restrictions KML. Last updated ${UPDATED_AT}.</description>
              <NetworkLink>
                <name>Active TFRs</name>
                <open>1</open>
                <refreshVisibility>1</refreshVisibility>
                <flyToView>0</flyToView>
                <Link>
                  <href>${PAGES_BASE_URL}/active_tfrs.kml</href>
                  <refreshMode>onInterval</refreshMode>
                  <refreshInterval>3600</refreshInterval>
                </Link>
              </NetworkLink>
            </Document>
          </kml>
          EOF

          cat > site/index.html <<EOF
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <title>Active TFRs</title>
            </head>
            <body>
              <main>
                <h1>Active TFRs</h1>
                <p>Last updated: <strong>${UPDATED_AT}</strong></p>
                <ul>
                  <li><a href="./active_tfrs.kml">active_tfrs.kml</a> - direct KML for Everbridge VCC</li>
                  <li><a href="./active_tfrs.kmz">active_tfrs.kmz</a></li>
                  <li><a href="./Active_TFRs_Network_Link.kml">Google Earth Network Link</a></li>
                </ul>
                <p>Everbridge VCC URL:</p>
                <p><code>${PAGES_BASE_URL}/active_tfrs.kml</code></p>
              </main>
            </body>
          </html>
          EOF

          echo "Built Pages files:"
          find site -maxdepth 1 -type f -printf "%f %s bytes\n"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Pages site
        id: deployment
        uses: actions/deploy-pages@v4
